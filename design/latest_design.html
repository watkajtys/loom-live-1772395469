<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mise: Quiet Focus Prep Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,500&amp;family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "alabaster": "#F0F2F0","charcoal": "#333333","cobalt": "#0047AB","cobalt-light": "#E6F0FF",
                        "stone-soft": "#EBECEB",
                    },
                    fontFamily: {
                        "sans": ["Space Grotesk", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    animation: {
                        'pulse-once': 'pulse-glow 2s ease-out forwards',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%': { boxShadow: 'inset 0 0 0 0px rgba(0, 71, 171, 0)' },
                            '50%': { boxShadow: 'inset 0 0 50px 0px rgba(0, 71, 171, 0.1)' },
                            '100%': { boxShadow: 'inset 0 0 0 0px rgba(0, 71, 171, 0)' },
                        }
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-alabaster text-charcoal font-sans min-h-screen flex flex-col overflow-hidden selection:bg-cobalt/20 selection:text-cobalt">
<div class="relative flex h-screen w-full flex-col items-center justify-between cursor-pointer animate-pulse-once group transition-colors duration-700">
<div class="relative z-10 w-full max-w-7xl px-8 pt-8 md:pt-12 flex flex-col items-center">
<div class="flex flex-wrap justify-center gap-2 md:gap-3">
<div class="flex h-8 items-center justify-center rounded-full bg-white border border-stone-200 px-4 transition-colors">
<span class="text-charcoal/60 text-xs font-medium uppercase tracking-wide">2 Cloves Garlic</span>
</div>
<div class="flex h-8 items-center justify-center rounded-full bg-cobalt-light border border-cobalt/30 px-4 shadow-sm">
<span class="text-cobalt text-xs font-bold uppercase tracking-wide">400g Pasta</span>
</div>
<div class="flex h-8 items-center justify-center rounded-full bg-white border border-stone-200 px-4 transition-colors">
<span class="text-charcoal/60 text-xs font-medium uppercase tracking-wide">Fresh Basil</span>
</div>
<div class="flex h-8 items-center justify-center rounded-full bg-white border border-stone-200 px-4 transition-colors">
<span class="text-charcoal/60 text-xs font-medium uppercase tracking-wide">Olive Oil</span>
</div>
<div class="flex h-8 items-center justify-center rounded-full bg-white border border-stone-200 px-4 transition-colors">
<span class="text-charcoal/60 text-xs font-medium uppercase tracking-wide">Reserved Water</span>
</div>
</div>
</div>
<div class="relative z-10 flex-1 flex flex-col items-center justify-center px-6 max-w-3xl mx-auto w-full text-center">
<div class="mb-6 text-cobalt opacity-80">
<span class="material-symbols-outlined text-4xl md:text-5xl font-light">skillet</span>
</div>
<h1 class="text-charcoal text-4xl md:text-6xl font-bold leading-tight tracking-tight mb-6">
                Toss the pasta with the emulsified sauce and a splash of reserved water.
            </h1>
<div class="w-12 h-px bg-cobalt/20 my-4"></div>
<p class="text-charcoal/70 font-serif italic text-xl md:text-2xl leading-relaxed max-w-xl">
                Aim for a glossy texture. If it looks dry, add another tablespoon of pasta water.
            </p>
</div>
<div class="relative z-10 w-full pb-10 flex flex-col items-center justify-end">
<div class="flex items-center gap-6 text-charcoal/40 transition-opacity duration-300 group-hover:text-charcoal/60">
<button aria-label="Previous Step" class="p-3 hover:text-cobalt hover:bg-cobalt/5 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="text-xs font-bold tracking-widest font-sans uppercase">Step 4 of 6</div>
<button aria-label="Next Step" class="p-3 hover:text-cobalt hover:bg-cobalt/5 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_forward</span>
</button>
</div>
</div>
<div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none mix-blend-multiply" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
</div>

</body></html>
